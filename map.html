<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fullscreen Map with Back</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      background-color: black;
    }


    iframe {
      width: 100%;
      height: calc(100% - 50px);
      border: none;
    }


    .bottom-bar {
      height: 50px;
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }


.back-link {
  display: inline-block;
  margin-top: 30px;
  font-size: 1rem;
  color: #fff;
  text-decoration: none;
  border: 1px solid #fff;
  padding: 10px 20px;
  border-radius: 8px;
  transition: background 0.3s, color 0.3s;
}
    
.back-link:hover {
      text-decoration: underline;
      background-color: white;
      color: black;
    }
    
  </style>
</head>
<body>


  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3362.3171030917283!2d-97.18725219999999!3d25.985365299999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x866fb3b62d08a6a7%3A0x26dabf65ad6ab558!2sStarbase!5e1!3m2!1sen!2siq!4v1747210736350!5m2!1sen!2siq" 
    allowfullscreen="" 
    loading="lazy" 
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>


  <div class="bottom-bar">
    <a href="index.html#starbase" class="back-link">BACK</a>
  </div>


</body>
</html>
