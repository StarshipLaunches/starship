<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SpaceX Starship information and updates.">
  <meta name="keywords" content="SpaceX, Starship, launch, tracker, orbital, launches, orbit, space, rocket, update">
</head>
  <title>Starship</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">


  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #fff;
    }


    .home {
      height: 100vh;
      background: url('https://via.placeholder.com/1600x900?text=Starship+Background') center center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }


    .overlay {
      background-color: rgba(0, 0, 0, 0.65);
      padding: 40px;
      text-align: center;
      border-radius: 12px;
    }


    .home h1 {
      font-size: 4rem;
      margin-bottom: 30px;
      letter-spacing: 6px;
    }


    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }


    .nav-buttons a {
      padding: 12px 25px;
      border: 2px solid #fff;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.3s, color 0.3s;
    }


    .nav-buttons a:hover {
      background: #fff;
      color: #000;
    }


    .gallery-section {
      padding-top: 100px;
    }


    .gallery-section h2 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
      border-bottom: 2px solid #fff;
      padding-bottom: 10px;
    }


    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
    }


    .photo {
      width: 100vw;
      position: relative;
    }


    .photo img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      transition: filter 0.3s;
    }


    .photo:hover img {
      filter: brightness(75%);
      cursor: pointer;
    }


    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.85);
    }


    .modal-content {
      background-color: #111;
      margin: 80px auto;
      padding: 30px;
      border: 1px solid #fff;
      width: 90%;
      max-width: 800px;
      color: #fff;
      border-radius: 10px;
      position: relative;
    }


    .modal-content h2 {
      margin-top: 0;
    }


    .close {
      color: #fff;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }


    .close:hover {
      color: #ccc;
    }


    .article-navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }


    .article-navigation button {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
    }


    .article-navigation button:hover {
      background: #fff;
      color: #000;
    }


    .carousel-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 30px;
    }


    .carousel-container img {
      width: 80%;
      max-height: 70vh;
      object-fit: contain;
      border: 2px solid #fff;
      border-radius: 10px;
    }


    .carousel-btn {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      font-size: 2rem;
      padding: 10px;
      cursor: pointer;
    }


    .carousel-btn:hover {
      background: #fff;
      color: #000;
    }


    footer {
      background: #111;
      padding: 20px;
      text-align: center;
      font-size: 1rem;
      border-top: 1px solid #444;
    }


    footer a {
      color: #0af;
      margin: 0 10px;
      text-decoration: none;
    }


    footer a:hover {
      text-decoration: underline;
    }
    
    
    .element {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      border: solid white;
      border-width: 0 7px 7px 0;
      display: inline-block;
      padding: 15px;
}
</style>
</head>
<body>

<i class="element"></i>

</body>
</html>
  </style>
</head>


<body>


  <section class="home">
    <div class="overlay">
      <h1>Starship</h1>
      <div class="nav-buttons">
        <a href="#starship">Starship</a>
        <a href="#development">Development</a>
        <a href="#starbase">Starbase</a>
        <a href="#carousel">Gallery</a>
      </div>
    </div>
  </section>


  <section id="starship" class="gallery-section">
    <h2>Starship</h2>
    <div class="gallery">
      <div class="photo" title="Starship">
        <img src="https://uploads.onecompiler.io/436q45n9e/43hq6udpd/Starship2.jpg" alt="Starship" class="starship-image">
      </div>
    </div>
  </section>


  <section id="development" class="gallery-section">
    <h2>Development</h2>
    <div class="gallery">
      <div class="photo" title="Static Fire">
        <img src="https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/SuperHeavyStaticFire.jpg" alt="Static Fire">
      </div>
    </div>
  </section>


  <section id="starbase" class="gallery-section">
    <h2>Starbase</h2>
    <div class="gallery">
      <div class="photo" title="Starbase">
        <img src="https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/Starbase.jpg" alt="Starbase">
      </div>
    </div>
  </section>


  <section id="carousel" class="gallery-section">
    <h2>Prototypes Gallery</h2>
    <div class="carousel-container">
      <button class="carousel-btn" id="prevImg">&#10094;</button>
      <img id="carousel-img" src="https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/1stTestVehicle.jpg" alt="Gallery Image">
      <button class="carousel-btn" id="nextImg">&#10095;</button>
    </div>
  </section>


  <div id="article-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="article-text"></div>
      <div class="article-navigation">
        <button id="prev-page">⟵ Prev</button>
        <button id="next-page">Next ⟶</button>
      </div>
    </div>
  </div>


  <footer id="footer">
    <p>
      Visit <a href="https://www.spacex.com" target="_blank" rel="noopener noreferrer">spacex.com</a> |
      Follow <a href="https://x.com/SpaceX" target="_blank" rel="noopener noreferrer">@SpaceX on X</a> |
      <a href="index.html">Back to Top</a> |
      <a href="disclaimer.html">Disclaimer</a>
      | <a href="resources.html">More Resources</a>
    </p>
  </footer>


  <script>
    const modal = document.getElementById('article-modal');
    const modalText = document.getElementById('article-text');
    const closeBtn = document.querySelector('.close');
    const nextBtn = document.getElementById('next-page');
    const prevBtn = document.getElementById('prev-page');


    const articles = {
      "Starship": [
        `<h2>Starship: The Future of Space Travel</h2><p>Starship is SpaceX's fully reusable next-generation spacecraft. Designed for interplanetary travel, it can carry up to 100 passengers and huge amounts of cargo.</p>`,
        `<p>Its stainless-steel body allows for heat shielding and durability during reentry, and it uses methane-fueled Raptor engines that are more efficient than traditional rocket engines. Learn more about <a href="https://www.spacex.com/vehicles/starship/" target="_blank" rel="noopener noreferrer">Starship</a>.</p>`
      ],
      "Static Fire": [
        `<h2>Development</h2><p>Static fire tests are crucial for validating engine performance without actually launching the rocket. This photo shows the Super Heavy booster undergoing one such test.</p>`,
        `<p>All engines are fired simultaneously while the rocket is clamped to the pad, ensuring everything is functioning safely before liftoff. Check for live <a href="https://www.nextspaceflight.com" target="_blank" rel="noopener noreferrer">updates</a> on Starship.</p>`
      ],
      "Starbase": [
        `<h2>Starbase: Launch Site in Texas</h2><p>Starbase is SpaceX's private launch site in Boca Chica, Texas. It's the heart of Starship development.</p>`,
        `<p>It includes build sites, test pads, and the orbital launch mount, making it one of the most advanced rocket testing facilities in the world. Watch a <a href="live.html">livestream</a> of Starbase. Check it out on the <a href="map.html">map</a>.</p>`
      ]
    };


    let currentArticle = [];
    let currentPage = 0;


    document.querySelectorAll('.photo').forEach(photo => {
      photo.addEventListener('click', () => {
        const title = photo.getAttribute('title');
        currentArticle = articles[title] || ['<h2>No Info</h2><p>No article available for this photo.</p>'];
        currentPage = 0;
        showPage();
        modal.style.display = 'block';
      });
    });


    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };


    function showPage() {
      modalText.innerHTML = currentArticle[currentPage];
      prevBtn.style.display = currentPage === 0 ? 'none' : 'inline-block';
      nextBtn.style.display = currentPage === currentArticle.length - 1 ? 'none' : 'inline-block';
    }


    nextBtn.onclick = () => {
      if (currentPage < currentArticle.length - 1) {
        currentPage++;
        showPage();
      }
    };


    prevBtn.onclick = () => {
      if (currentPage > 0) {
        currentPage--;
        showPage();
      }
    };


    const images = [
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/1stTestVehicle.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/1stTestVehicleNight.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/Hop.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/Hop2.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/Hop3.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/HighAltitudeTest4.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/HighAltitudeTest11.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/Starship32.jpg",
      "https://uploads.onecompiler.io/436q45n9e/43hkxmm5u/Raptor.jpg"
    ];


    let currentImgIndex = 0;
    const carouselImg = document.getElementById('carousel-img');
    document.getElementById('nextImg').onclick = () => {
      currentImgIndex = (currentImgIndex + 1) % images.length;
      carouselImg.src = images[currentImgIndex];
    };
    document.getElementById('prevImg').onclick = () => {
      currentImgIndex = (currentImgIndex - 1 + images.length) % images.length;
      carouselImg.src = images[currentImgIndex];
    };
  </script>


</body>
</html>
