<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starship Live Updates</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #fff;
      padding: 20px;
    }


    h1 {
      text-align: center;
      font-size: 2.5rem;
    }
    
.back-link {
  display: inline-block;
  margin-top: 30px;
  font-size: 1rem;
  color: #fff;
  text-decoration: none;
  border: 1px solid #fff;
  padding: 10px 20px;
  border-radius: 8px;
  transition: background 0.3s, color 0.3s;
  justify-content: center;
  align-items: center;
}
    
.back-link:hover {
      text-decoration: underline;
      background-color: white;
      color: black;
    }




    iframe {
      display: block;
      margin: 40px auto;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 2px solid #fff;
      border-radius: 10px;
      height: calc(100% - 50px);
    }


    small {
      color: #aaa;
    }


    a {
      color: #0af;
      text-decoration: none;
    }


    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Starbase Livestream</h1>
  <iframe src="https://m.youtube.com/watch?v=mhJRzQsLZGg" 
          title="Starbase Livestream" 
          frameborder="0" 
          allow="autoplay; encrypted-media" 
          allowfullscreen>
  </iframe>
  <p style="text-align: center;"><a href="index.html#starbase" class="back-link">BACK</a></p>
</body>
</html>
